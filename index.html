<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

      height: 100%;
      min-height: 100dvh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe 
    src="https://script.google.com/macros/s/AKfycbx9A5f8KCrcs38DoKiq1p7ZtON20y1O70E2gR9sZI0xx8NC8AyaQiBXrT0FCEN2LhYCyQ/exec?page=public"
    allow="*"

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
